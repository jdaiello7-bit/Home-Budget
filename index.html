/* ═══ RESET PASSWORD SCREEN (from email link) ════════════════════════════════ */
function ResetPasswordScreen({onDone}){
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const submit=async()=>{
    if(pw.length<8){setErr('Password must be at least 8 characters');return;}
    if(pw!==pw2){setErr('Passwords do not match');return;}
    setLoading(true);setErr('');
    try{
      const sb=getSB();
      const{error}=await sb.auth.updateUser({password:pw});
      if(error)throw error;
      setDone(true);
      setTimeout(onDone,2500);
    }catch(e){setErr(e.message||'Could not reset password. The link may have expired — request a new one.');}
    finally{setLoading(false);}
  };
  return(
    <div className="onboard">
      <div className="onboard-top">
        <div className="onboard-icon"><Icon name="key" size={36}/></div>
        <div className="onboard-title">Set New Password</div>
        <div className="onboard-sub">Choose a strong new password for your account.</div>
      </div>
      <div className="onboard-sheet">
        {done?<>
          <div className="success-banner">Password updated successfully! You'll be taken to the sign-in screen in a moment.</div>
        </>:<>
          <div className="field">
            <div className="field-label">New Password</div>
            <input className="field-input" type="password" placeholder="Min. 8 characters" value={pw} onChange={e=>setPw(e.target.value)} autoFocus/>
            <div className="pw-rules">Use at least 8 characters with a mix of letters and numbers.</div>
          </div>
          <div className="field"><div className="field-label">Confirm New Password</div><input className="field-input" type="password" placeholder="Re-enter password" value={pw2} onChange={e=>setPw2(e.target.value)}/></div>
          {err&&<div className="err-banner">{err}</div>}
          <button className="primary-btn" onClick={submit} disabled={loading||!pw||!pw2}>{loading?'Updating…':'Set New Password'}</button>
          <button className="cancel-btn" onClick={onDone}>Cancel</button>
        </>}
      </div>
    </div>
  );
}

/* ═══ CHANGE PASSWORD MODAL (from settings) ══════════════════════════════════ */
function ChangePasswordModal({user,onClose}){
  const [currentPw,setCurrentPw]=useState('');
  const [newPw,setNewPw]=useState('');
  const [confirmPw,setConfirmPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const submit=async()=>{
    if(!currentPw){setErr('Enter your current password');return;}
    if(newPw.length<8){setErr('New password must be at least 8 characters');return;}
    if(newPw!==confirmPw){setErr('New passwords do not match');return;}
    if(newPw===currentPw){setErr('New password must be different from current password');return;}
    setLoading(true);setErr('');
    try{
      const sb=getSB();
      // Re-authenticate with current password first to verify it
      const{error:authErr}=await sb.auth.signInWithPassword({email:user.email,password:currentPw});
      if(authErr)throw new Error('Current password is incorrect');
      // Update to new password (Supabase sends a security notification email automatically)
      const{error:updateErr}=await sb.auth.updateUser({password:newPw});
      if(updateErr)throw updateErr;
      setDone(true);
    }catch(e){setErr(e.message||'Could not update password');}
    finally{setLoading(false);}
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-drag"/>
        <div className="sheet-title">Change Password</div>
        <div className="sheet-body">
          {done?<>
            <div className="success-banner" style={{margin:'4px 0 0'}}>Password changed successfully! A confirmation email has been sent to {user.email}.</div>
          </>:<>
            <div className="field"><div className="field-label">Current Password</div><input className="field-input" type="password" placeholder="Your current password" value={currentPw} onChange={e=>setCurrentPw(e.target.value)} autoFocus/></div>
            <div className="field">
              <div className="field-label">New Password</div>
              <input className="field-input" type="password" placeholder="Min. 8 characters" value={newPw} onChange={e=>setNewPw(e.target.value)}/>
              <div className="pw-rules">Use at least 8 characters with a mix of letters and numbers.</div>
            </div>
            <div className="field"><div className="field-label">Confirm New Password</div><input className="field-input" type="password" placeholder="Re-enter new password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)}/></div>
            {err&&<div className="err-banner" style={{margin:'0 0 10px'}}>{err}</div>}
          </>}
        </div>
        <div className="sheet-footer">
          {done
            ?<button className="primary-btn" onClick={onClose}>Done</button>
            :<><button className="primary-btn" onClick={submit} disabled={loading||!currentPw||!newPw||!confirmPw}>{loading?'Updating…':'Update Password'}</button><button className="cancel-btn" onClick={onClose}>Cancel</button></>
          }
        </div>
      </div>
    </div>
  );
}

/* ═══ BILLS SCREEN ═══════════════════════════════════════════════════════════ */
function BillsScreen({setup,transactions,month,year,paidBills,onPaidToggle,onAddTx}){
  const now=new Date();
  const allFixed=setup.fixed.filter(c=>c.due&&c.due!=='–');

  // Build bill list with due days computed for this month and next
  const bills=allFixed.map(cat=>{
    const dueDay=parseDueDay(cat.due);
    if(!dueDay)return null;
    const days=daysUntilDue(dueDay,year,month);
    const paidKey=`${month}_${cat.id}`;
    const isPaid=!!(paidBills&&paidBills[paidKey]);
    const moAct=catActual(transactions,year,month,cat.id);
    return{...cat,dueDay,days,isPaid,moAct,paidKey};
  }).filter(Boolean).sort((a,b)=>(a.days??999)-(b.days??999));

  const groups=[
    {label:'Due Today or Overdue', filter:b=>!b.isPaid&&b.days!==null&&b.days<=0},
    {label:'Due This Week',        filter:b=>!b.isPaid&&b.days!==null&&b.days>0&&b.days<=7},
    {label:'Due This Month',       filter:b=>!b.isPaid&&b.days!==null&&b.days>7},
    {label:'Paid',                 filter:b=>b.isPaid},
  ];

  const totalDue=bills.filter(b=>!b.isPaid).reduce((s,b)=>s+b.budget,0);

  return(
    <div className="bills-wrap">
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--muted)',marginBottom:4}}>Total Due This Month</div>
        <div style={{fontFamily:"DM Serif Display,serif",fontSize:28,color:'var(--ink)'}}>{fmtC(totalDue)}</div>
      </div>
      {groups.map(grp=>{
        const items=bills.filter(grp.filter);
        if(items.length===0)return null;
        const grpTotal=items.reduce((s,b)=>s+b.budget,0);
        return(
          <div key={grp.label} className="bills-today" style={{marginBottom:10}}>
            <div className="bills-sec-hdr">
              <span className="bills-sec-lbl">{grp.label}</span>
              <span className="bills-sec-total">{fmtC(grpTotal,true)}</span>
            </div>
            {items.map(b=>{
              const urgency=b.isPaid?'future':b.days<=0?'today':b.days<=7?'soon':b.days<=14?'upcoming':'future';
              const daysLabel=b.days===null?'–':b.days===0?'Today':b.days<0?`${Math.abs(b.days)}d late`:`${b.days}d`;
              return(
                <div key={b.id} className="bill-row">
                  <div className={`bill-days ${urgency}`}>
                    <span className="bill-days-n">{daysLabel}</span>
                  </div>
                  <div className="bill-info">
                    <div className="bill-name">{b.name}</div>
                    <div className="bill-due">Due {b.due}{b.moAct>0?` · Paid ${fmtC(b.moAct,true)}`:''}</div>
                  </div>
                  <div className="bill-amount">{fmtC(b.budget,true)}</div>
                  <button className={`bill-paid-btn${b.isPaid?' paid':''}`}
                    onClick={()=>onPaidToggle(b.paidKey)}>
                    {b.isPaid?'✓ Paid':'Mark Paid'}
                  </button>
                </div>
              );
            })}
          </div>
        );
      })}
      {bills.length===0&&<div className="no-tx"><div className="no-tx-icon"><Icon name="bell" size={36} color="var(--border)"/></div><div className="no-tx-txt">No fixed bills configured</div><div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Add fixed expenses with due dates in Setup</div></div>}
    </div>
  );
}

                <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{e.sub}</div>
              </div>
              <button className="export-btn" onClick={()=>{e.fn();onClose();}}><Icon name="download" size={14}/>Download</button>
            </div>
          ))}
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--muted)',margin:'12px 0 8px'}}>By Month</div>
          {exports.slice(2).map((e,i)=>(
            <div key={i} className="export-row">
              <div>
                <div className="export-lbl">{e.label}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{e.sub}</div>
              </div>
              <button className="export-btn" onClick={()=>{e.fn();onClose();}}><Icon name="download" size={14}/>Download</button>
            </div>
          ))}
        </div>
        <div className="sheet-footer"><button className="cancel-btn" style={{marginTop:0}} onClick={onClose}>Close</button></div>
      </div>
    </div>
  );
}

/* ═══ SPLIT TRANSACTION HELPER ═══════════════════════════════════════════════ */
function SplitModal({tx,setup,onSave,onClose}){
  const allCats=[...setup.income,...setup.fixed,...setup.variable].filter(c=>c.id!==tx.catId);
  const [splits,setSplits]=useState([{catId:allCats[0]?.id||'',amount:''}]);
  const addSplit=()=>setSplits(p=>[...p,{catId:allCats[0]?.id||'',amount:''}]);
  const remSplit=i=>setSplits(p=>p.filter((_,j)=>j!==i));
  const updateSplit=(i,k,v)=>setSplits(p=>p.map((s,j)=>j===i?{...s,[k]:v}:s));
  const splitTotal=splits.reduce((s,sp)=>s+(parseFloat(sp.amount)||0),0);
  const remaining=tx.amount-splitTotal;
  const submit=()=>{
    const valid=splits.filter(s=>s.catId&&parseFloat(s.amount)>0);
    if(valid.length===0)return;
    onSave(tx,valid,remaining>0.005?remaining:null);
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-drag"/>
        <div className="sheet-title">Split Transaction</div>
        <div className="sheet-body">
          <div style={{background:'var(--sage-bg)',borderRadius:'var(--radius-sm)',padding:'10px 13px',marginBottom:14}}>
            <div style={{fontSize:11,color:'var(--sage)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px'}}>Original</div>
            <div style={{fontSize:16,fontWeight:700,color:'var(--ink)',marginTop:3}}>{tx.notes||catNameFn(tx.catId,setup)} · {fmtC(tx.amount)}</div>
          </div>
          {splits.map((sp,i)=>(
            <div key={i} className="split-row">
              <div style={{flex:1,minWidth:0}}>
                <select className="field-select" style={{fontSize:13,padding:'6px 28px 6px 8px',marginBottom:4}} value={sp.catId} onChange={e=>updateSplit(i,'catId',e.target.value)}>
                  {allCats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <input className="split-input" type="number" inputMode="decimal" placeholder="$0.00"
                value={sp.amount} onChange={e=>updateSplit(i,'amount',e.target.value)}/>
              <button style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',padding:4}} onClick={()=>remSplit(i)}><Icon name="x" size={16}/></button>
            </div>
          ))}
          <button onClick={addSplit} style={{background:'none',border:'1.5px dashed var(--border)',borderRadius:'var(--radius-sm)',padding:'8px 14px',width:'100%',color:'var(--muted)',fontSize:13,fontWeight:600,fontFamily:"DM Sans,sans-serif",cursor:'pointer',marginBottom:10}}>+ Add Split</button>
          <div className="split-total" style={{color:Math.abs(remaining)<0.01?'var(--sage)':remaining<0?'var(--red)':'var(--ink)'}}>
            {Math.abs(remaining)<0.01?'✓ Fully split':`Remaining: ${fmtC(remaining,true)}`}
          </div>
        </div>
        <div className="sheet-footer">
          <button className="primary-btn" onClick={submit} disabled={splits.every(s=>!parseFloat(s.amount))}>Apply Split</button>
          <button className="cancel-btn" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
